<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>

    <!-- daisyUI & Tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS link  -->
    <link rel="stylesheet" href="./style.css">

    <!-- font awesome link  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>

<body class="bg-base-200">

<header class="bg-white mb-4">

    <div class="navbar bg-base-100 shadow-sm px-4 lg:px-9 flex flex-col lg:flex-row gap-3 lg:gap-0">

        <div class="flex-1">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo_25231 1 (1).png" alt="">
                <a class="btn btn-ghost text-lg lg:text-xl">GitHub Issues Tracker</a>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto">

            <input id="input-search"
                type="text"
                placeholder="Search"
                class="input input-bordered w-full sm:w-60" />

            <button id="btn-search" class="btn btn-primary w-full sm:w-auto">
                + New Issue
            </button>

        </div>

    </div>

</header>


<section class="w-[95%] sm:w-[90%] lg:w-[80%] mx-auto space-y-4">

    <!-- filter buttons -->
    <div class="bg-white shadow-md flex flex-wrap gap-3 py-3 px-5 rounded-md">

        <button id="all-btn" onclick="showAll('all-btn')" class="btn btn-active btn-primary px-7">
            All
        </button>

        <button id="open-btn" onclick="showAll('open-btn')" class="btn px-7">
            Open
        </button>

        <button id="close-btn" onclick="showAll('close-btn')" class="btn px-7">
            Closed
        </button>

    </div>


    <!-- issue counter -->
    <div class="bg-white shadow-md flex flex-col sm:flex-row gap-4 sm:gap-0 justify-between p-4 rounded-md">

        <div class="flex items-center gap-2">
            <img src="./assets/Aperture.png" alt="">
            <div>
                <h2 class="font-bold text-lg sm:text-xl">
                    <span id="cnt-issue">50</span> Issues
                </h2>
                <p class="text-[#64748B] text-sm sm:text-base">
                    Track and manage your project issues
                </p>
            </div>
        </div>


        <div class="flex items-center gap-4">

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                <p>Open</p>
            </div>

            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                <p>Closed</p>
            </div>

        </div>

    </div>


    <!-- loading -->
    <section id="loading" class="hidden justify-center">
        <span class="loading loading-bars loading-xl"></span>
    </section>


    <!-- cards -->
    <div class="bg-white shadow-md rounded-md">

        <div id="card-container"
            class="p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

        </div>

    </div>


    <!-- modal -->
    <dialog id="my_modal_1" class="modal">
    </dialog>

</section>


<script src="./home_script.js"></script>

</body>
</html>
