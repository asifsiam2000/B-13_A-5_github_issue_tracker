    <header class="bg-white mb-4">

                <div class="flex">
                    <img src="./assets/github-logo_25231 1 (1).png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                </div>
            </div>
            <div class="flex gap-2">

                <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />

        </div>

        <!-- Button of hero section  -->
        <div class="bg-white shadow-md space-x-3 py-3 px-5 rounded-md">
            <button id="all-btn" onclick="showAll('all-btn')" class="btn btn-active btn-primary px-7 ">All</button>
            <button id="open-btn" onclick="showAll('open-btn')" class="btn px-7 ">Open</button>
            <button id="close-btn" onclick="showAll('close-btn')" class="btn px-7 ">closed</button>
        </div>


        <!-- dynamically change value of hero section  -->
        <div class="bg-white shadow-md flex justify-between p-3 rounded-md">
            <div class="flex items-center gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="font-bold text-xl"><span id="cnt-issue">50</span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>


            <div class="flex items-center gap-4">

                <!-- Open -->
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    <p>Open</p>
                </div>

                <!-- Closed -->
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    <p>Closed</p>
                </div>

            </div>
        </div>

        <!-- loading function  -->
        <section id="loading" class="hidden justify-center">
            <span class="loading loading-bars loading-xl"></span>
        </section>

        <!-- card section of hero  -->
        <div class="bg-white shadow-md rounded-md">
