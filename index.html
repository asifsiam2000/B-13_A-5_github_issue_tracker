<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>

    <!-- daisyUI & Tailwind  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS link  -->
    <link rel="stylesheet" href="./style.css">
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto mt-10 rounded-sm">
    <header class=" mx-auto pt-10">
        <div class="text-center ">
            <div class="flex justify-center"><img src="./assets/github-logo.png" alt="" class=""></div>
            <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
            <p class="font-semibold text-[#64748B]">Sign in to manage your issues</p>
        </div>



         <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold text-xl">Username </label>
                    <input id="input-username" type="text" 
                        class="input rounded-full bg-base-200 border-none" placeholder="Enter Username" />

                    <p class="text-[#4A00FF]">Default: admin</p>    

                    <label class="label text-neutral font-bold text-xl">password</label>
                    <input id="input-password" type="text" 
                        class="input rounded-full bg-base-200 border-none" placeholder="Enter password" />

                    <p class="text-[#4A00FF]">Default: admin123</p>

                    <button id="login-btn"
                        class="btn btn-primary mt-4 rounded-full  font-semibold text-[1.125rem]">Sign In</button>
                </fieldset>
            </div>
        </div>
    </div>

    </header>



    <script src="./login.js"></script>
</body>

</html>
